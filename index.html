<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="favicon.png" type="image/png">
<title id="title" data-i18n="title">🌟 HoshiHo 歌單 💐</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<div id="app-container">
    <div id="sidebar-container"></div>
    <div class="main-content" id="mainContent">
        <div class="header">
            <h1 id="pageTitle" data-i18n="title">🌟 HoshiHo 歌單 💐</h1>
            <p id="totalSongs"><span data-i18n="totalSongs">總曲數：</span><span id="songCount"></span></p>
        </div>
        <div class="search-container">
            <input type="text" id="searchInput" data-i18n="searchPlaceholder" placeholder="搜尋歌名、歌手、來源或日期(DDMMYYYY) ...">
            <button id="randomButton" class="random-button" data-i18n="randomBtn" aria-label="隨機" title="隨機">🎲</button>
            <div class="tag-toggle-wrapper">
                <button id="tagToggle" class="tag-toggle" aria-expanded="false" aria-label="Toggle tags">
                    <svg width="16" height="9" viewBox="0 0 16 9" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                        <path d="M2 2L8 7L14 2" stroke="#6a5acd" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
        </div>
        <div class="tags-filter-container collapsed" id="tagsFilterContainer">
            <span data-i18n="filterByTag">篩選 Tag：</span>
            <div id="tagButtons" class="tag-buttons"></div>
        </div>
        <div class="virtual-scroll-container" id="virtualScrollContainer">
            <div class="virtual-scroll-content" id="virtualScrollContent">
                <table id="songTable">
                    <thead>
                        <tr>
                            <th class="az" data-i18n="az">A-Z</th>
                            <th class="song-title" data-i18n="songTitle">曲名</th>
                            <th class="artist" data-i18n="artist">歌手</th>
                            <th class="source" data-i18n="source">出典</th>
                            <th class="date-header" data-i18n="date" colspan="4">日期</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- 這裡將由 JavaScript 動態生成內容 -->
                    </tbody>
                </table>
            </div>
        </div>
        <div id="floatingPlayerContainer" class="floating-player-container">
            <iframe id="floatingPlayer" frameborder="0" allow="autoplay; encrypted-media; picture-in-picture; fullscreen" allowfullscreen></iframe>
            <button id="closeFloatingPlayerButton" class="close-btn" onclick="closeFloatingPlayer()">✕</button>
        </div>
    </div>
</div>

<script src="js/core.js"></script>
<script src="js/youtube-player.js"></script>
<script type="module" src="js/form-generation.js"></script>

</body>
</html>
