name: Refresh Tags from data.json

on:
  workflow_dispatch:

jobs:
  refresh-tags:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run update_tags_from_data.py
        run: |
          python backend/update_tags_from_data.py

      - name: Commit tags.txt if updated
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add timeline/tags.txt
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Refresh timeline/tags.txt for new data.json entries [skip ci]"
            git push
          fi
