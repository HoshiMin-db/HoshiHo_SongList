name: Update Timeline

permissions:
  contents: write

on:
  push:
    paths:
      - 'timeline/**'
  workflow_dispatch:

jobs:
  update-timeline:
    runs-on: ubuntu-latest

    steps:
      # 升級至 v4 以支援 Node.js 24
      - name: Checkout repository
        uses: actions/checkout@v4

      # 升級至 v5 以支援 Node.js 24
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client

      - name: Run process_timeline.py
        run: python backend/process_timeline.py

      - name: Configure Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Force add and commit data.json
        run: |
          # 檢查 data.json 是否存在並嘗試加入暫存
          if [ -f "data.json" ]; then
            git add -f data.json
            # 檢查是否有內容變動
            if git diff --staged --quiet; then
              echo "No changes in data.json to commit."
            else
              git commit -m "Update data.json with timestamp [skip ci]"
              git push
            fi
          else
            echo "data.json not found, skipping commit."
          fi
